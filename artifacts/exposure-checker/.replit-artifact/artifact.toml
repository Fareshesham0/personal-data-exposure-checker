kind = "web"
previewPath = "/"
title = "Personal Data Exposure Checker"
version = "1.0.0"
id = "artifacts/exposure-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22530

[services.development]
run = "pnpm --filter @workspace/exposure-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exposure-checker", "run", "build" ]
publicDir = "artifacts/exposure-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22530"
BASE_PATH = "/"
